<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeReview by Manish — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --bg2: #0c0f14;
            --bg3: #13171e;
            --card: #141920;
            --border: #1e2630;
            --text: #eaf0f6;
            --sub: #8b949e;
            --muted: #5a6370;
            --accent: #6366f1;
            --accent2: #818cf8;
            --cyan: #22d3ee;
            --green: #34d399;
            --green-bg: rgba(52,211,153,0.1);
            --yellow: #fbbf24;
            --yellow-bg: rgba(251,191,36,0.1);
            --orange: #fb923c;
            --orange-bg: rgba(251,146,60,0.1);
            --red: #f87171;
            --red-bg: rgba(248,113,113,0.1);
            --blue: #60a5fa;
            --blue-bg: rgba(96,165,250,0.1);
            --violet: #a78bfa;
            --violet-bg: rgba(167,139,250,0.1);
            --r: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ── Header ────────── */
        .hdr {
            background: linear-gradient(135deg, var(--bg2), #0e1320);
            border-bottom: 1px solid var(--border);
            padding: 14px 40px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .hdr-left { display: flex; align-items: center; gap: 12px; }
        .hdr-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: #fff;
        }
        .hdr-name {
            font-size: 18px; font-weight: 800;
            background: linear-gradient(135deg, var(--accent2), var(--cyan));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hdr-by { font-size: 12px; color: var(--muted); margin-left: 6px; }
        .hdr-badge {
            background: rgba(99,102,241,0.1); color: var(--accent2);
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            border: 1px solid rgba(99,102,241,0.2); margin-left: 10px;
        }
        .usr { display: flex; align-items: center; gap: 12px; }
        .usr img { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border); }
        .usr-name { font-size: 13px; font-weight: 600; color: var(--text); }
        .usr a { color: var(--muted); font-size: 12px; text-decoration: none; padding: 5px 10px; border-radius: 6px; transition: all 0.2s; }
        .usr a:hover { background: var(--bg3); color: var(--text); }

        /* ── Tabs ──────────── */
        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 40px; background: var(--bg2); }
        .tab {
            padding: 13px 24px; font-size: 13px; font-weight: 600; color: var(--sub);
            cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

        .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 40px; }

        /* ── Panels ─────────── */
        .pnl { display: none; }
        .pnl.active { display: block; animation: fi 0.3s ease; }
        @keyframes fi { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Metrics ────────── */
        .mg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .mc {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
            padding: 22px; position: relative; overflow: hidden; transition: all 0.3s;
        }
        .mc:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .mc::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
        .mc:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), var(--violet)); }
        .mc:nth-child(2)::before { background: linear-gradient(90deg, var(--green), var(--cyan)); }
        .mc:nth-child(3)::before { background: linear-gradient(90deg, var(--orange), var(--yellow)); }
        .mc:nth-child(4)::before { background: linear-gradient(90deg, var(--violet), var(--accent)); }
        .mc-label { font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
        .mc-val { font-size: 34px; font-weight: 800; color: #ffffff; }
        .mc-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

        /* ── Repos ──────────── */
        .rg { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }
        .rc {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
            padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s;
        }
        .rc:hover { border-color: var(--accent); }
        .rc h3 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
        .rc h3 a { color: var(--accent2); text-decoration: none; }
        .rc h3 a:hover { text-decoration: underline; }
        .rc-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); }
        .rc-meta .ld { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .tb {
            padding: 7px 18px; border-radius: 8px; font-size: 12px; font-weight: 700;
            font-family: inherit; cursor: pointer; border: none; transition: all 0.2s;
        }
        .tb.on { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
        .tb.on:hover { background: var(--green); color: #fff; }
        .tb.off { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
        .tb.off:hover { background: var(--red); color: #fff; }
        .tb:disabled { opacity: 0.5; cursor: wait; }

        /* ── Reviews ────────── */
        .rv {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
            overflow: hidden; transition: all 0.3s; margin-bottom: 14px;
        }
        .rv:hover { border-color: var(--accent); }
        .rv-hd { padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .rv-hd:hover { background: rgba(99,102,241,0.03); }
        .rv-info { display: flex; align-items: center; gap: 14px; }
        .rv-score {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800;
        }
        .s-hi { background: var(--green-bg); color: var(--green); }
        .s-md { background: var(--yellow-bg); color: var(--yellow); }
        .s-lo { background: var(--orange-bg); color: var(--orange); }
        .s-cr { background: var(--red-bg); color: var(--red); }
        .rv-title { font-size: 14px; font-weight: 700; color: var(--text); }
        .rv-meta { display: flex; gap: 12px; margin-top: 3px; }
        .rv-meta span { font-size: 11px; color: var(--sub); }
        .bdg { padding: 2px 9px; border-radius: 14px; font-size: 10px; font-weight: 700; }
        .bdg-cr { background: var(--red-bg); color: var(--red); }
        .bdg-hi { background: var(--orange-bg); color: var(--orange); }
        .bdg-md { background: var(--yellow-bg); color: var(--yellow); }
        .exp { color: var(--muted); transition: transform 0.3s; font-size: 14px; }
        .rv.open .exp { transform: rotate(180deg); }
        .rv-dt { display: none; border-top: 1px solid var(--border); padding: 22px; }
        .rv.open .rv-dt { display: block; animation: fi 0.3s; }

        /* ── File table ─────── */
        .ft { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
        .ft th { text-align: left; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; padding: 8px 12px; border-bottom: 1px solid var(--border); letter-spacing: 0.5px; }
        .ft td { padding: 10px 12px; font-size: 12px; border-bottom: 1px solid rgba(30,38,48,0.5); color: var(--text); }
        .fn { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--accent2); }
        .vt { padding: 2px 9px; border-radius: 14px; font-size: 10px; font-weight: 700; }
        .vt-EXCELLENT { background: var(--green-bg); color: var(--green); }
        .vt-GOOD { background: var(--blue-bg); color: var(--blue); }
        .vt-NEEDS_IMPROVEMENT { background: var(--yellow-bg); color: var(--yellow); }
        .vt-RISKY { background: var(--orange-bg); color: var(--orange); }
        .vt-CRITICAL { background: var(--red-bg); color: var(--red); }
        .sb { width: 100%; height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .sb-f { height: 100%; border-radius: 2px; }

        /* ── Comments ────────── */
        .cm { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 3px solid; }
        .cm.sev-critical { border-left-color: var(--red); }
        .cm.sev-high { border-left-color: var(--orange); }
        .cm.sev-medium { border-left-color: var(--yellow); }
        .cm.sev-low { border-left-color: var(--blue); }
        .cm.sev-info { border-left-color: var(--violet); }
        .cm-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .cm-file { font-family: monospace; font-size: 10px; color: var(--accent2); background: rgba(99,102,241,0.1); padding: 2px 7px; border-radius: 4px; }
        .cm-sev { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .cm-msg { font-size: 12px; line-height: 1.5; color: var(--text); }
        .cm-sug { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-top: 6px; font-family: monospace; font-size: 11px; color: var(--green); white-space: pre-wrap; }

        .empty { text-align: center; padding: 50px 40px; color: var(--muted); }
        .empty .ei { font-size: 44px; margin-bottom: 10px; }
        .empty h2 { font-size: 16px; color: var(--sub); margin-bottom: 5px; }
        .empty p { font-size: 12px; }

        .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
        .st { font-size: 15px; font-weight: 700; }
        .rb { background: var(--bg3); border: 1px solid var(--border); color: var(--sub); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 600; transition: all 0.2s; }
        .rb:hover { background: rgba(99,102,241,0.1); border-color: var(--accent); color: var(--accent2); }

        .ld { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 36px; color: var(--muted); font-size: 13px; }
        .sp { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp 0.7s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }

        .si {
            background: var(--bg3); border: 1px solid var(--border); color: var(--text);
            padding: 10px 16px; border-radius: 8px; font-size: 13px; font-family: inherit;
            width: 100%; max-width: 380px; margin-bottom: 18px; outline: none; transition: border-color 0.2s;
        }
        .si:focus { border-color: var(--accent); }
        .si::placeholder { color: var(--muted); }

        @media (max-width: 900px) { .mg { grid-template-columns: repeat(2, 1fr); } .wrap { padding: 16px; } }
        @media (max-width: 600px) { .mg { grid-template-columns: 1fr; } .rg { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="hdr">
        <div class="hdr-left">
            <div class="hdr-icon">CR</div>
            <span class="hdr-name">CodeReview</span>
            <span class="hdr-by">by Manish</span>
            <span class="hdr-badge">Dashboard</span>
        </div>
        <div class="usr" id="usr"></div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="sw('ov')">📊 Overview</div>
        <div class="tab" onclick="sw('rp')">📁 Repos</div>
        <div class="tab" onclick="sw('rv')">📋 Reviews</div>
    </div>

    <div class="wrap">
        <div class="pnl active" id="p-ov">
            <div class="mg">
                <div class="mc"><div class="mc-label">Total Reviews</div><div class="mc-val" id="v0">—</div><div class="mc-sub">Pull requests analyzed</div></div>
                <div class="mc"><div class="mc-label">Avg Safety Score</div><div class="mc-val" id="v1">—</div><div class="mc-sub">Out of 100</div></div>
                <div class="mc"><div class="mc-label">Issues Found</div><div class="mc-val" id="v2">—</div><div class="mc-sub">Bugs, security, style</div></div>
                <div class="mc"><div class="mc-label">Tokens Used</div><div class="mc-val" id="v3">—</div><div class="mc-sub">LLM consumption</div></div>
            </div>
            <div class="sh"><div class="st">📋 Recent Reviews</div><button class="rb" onclick="ld()">🔄 Refresh</button></div>
            <div id="rr"><div class="ld"><div class="sp"></div>Loading...</div></div>
        </div>

        <div class="pnl" id="p-rp">
            <div class="sh"><div class="st">📁 Your Repositories</div><button class="rb" onclick="lr()">🔄 Refresh</button></div>
            <input type="text" class="si" placeholder="🔍 Search repositories..." oninput="fr(this.value)">
            <div id="rc"><div class="ld"><div class="sp"></div>Loading repos...</div></div>
        </div>

        <div class="pnl" id="p-rv">
            <div class="sh"><div class="st">📋 All Reviews</div><button class="rb" onclick="lv()">🔄 Refresh</button></div>
            <div id="rvl"><div class="ld"><div class="sp"></div>Loading...</div></div>
        </div>
    </div>

    <script>
        const A = location.origin;
        let ar = [];

        const sc = s => s >= 80 ? 's-hi' : s >= 60 ? 's-md' : s >= 40 ? 's-lo' : 's-cr';
        const sco = s => s >= 80 ? '#34d399' : s >= 60 ? '#fbbf24' : s >= 40 ? '#fb923c' : '#f87171';
        const tf = t => new Date(t).toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
        const lc = {Python:'#3776ab',JavaScript:'#f7df1e',TypeScript:'#3178c6',Java:'#b07219',Go:'#00add8',Rust:'#dea584',HTML:'#e34c26',CSS:'#563d7c',C:'#555','C++':'#f34b7d'};

        function sw(n) {
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('active'));
            document.querySelector(`.tab[onclick="sw('${n}')"]`).classList.add('active');
            document.getElementById(`p-${n}`).classList.add('active');
            if(n==='rp') lr(); if(n==='rv') lv();
        }

        function tr(i){document.getElementById(`r-${i}`).classList.toggle('open')}

        function rrc(r) {
            const c = lc[r.language]||'#5a6370';
            return `<div class="rc" data-n="${r.full_name.toLowerCase()}"><div><h3><a href="https://github.com/${r.full_name}" target="_blank">${r.full_name}</a></h3><div class="rc-meta">${r.language?`<span><span class="ld" style="background:${c}"></span>${r.language}</span>`:''}<span>${r.private?'🔒 Private':'🌐 Public'}</span></div></div><button class="tb ${r.enabled?'off':'on'}" onclick="tg('${r.full_name}',${r.enabled})" id="b-${r.full_name.replace('/','-')}">${r.enabled?'✕ Disable':'✓ Enable'}</button></div>`;
        }

        async function tg(fn,en) {
            const [o,r]=fn.split('/'), b=document.getElementById(`b-${fn.replace('/','-')}`);
            b.disabled=true; b.textContent='...';
            try { await fetch(`${A}/auth/repos/${o}/${r}/${en?'disable':'enable'}`,{method:'POST'}); lr(); }
            catch(e) { alert('Failed: '+e.message); }
            b.disabled=false;
        }

        function fr(q) {
            const l=q.toLowerCase();
            document.querySelectorAll('.rc').forEach(c=>{c.style.display=c.dataset.n.includes(l)?'':'none'});
        }

        function rrv(r,i) {
            const s=r.score||0, bg=[];
            if(r.critical>0)bg.push(`<span class="bdg bdg-cr">🔴 ${r.critical}</span>`);
            if(r.high>0)bg.push(`<span class="bdg bdg-hi">🟠 ${r.high}</span>`);
            if(r.medium>0)bg.push(`<span class="bdg bdg-md">🟡 ${r.medium}</span>`);
            let d='';
            if(r.file_reports&&r.file_reports.length){
                d+='<table class="ft"><thead><tr><th>File</th><th>Score</th><th>Verdict</th><th>Summary</th></tr></thead><tbody>';
                for(const f of r.file_reports)d+=`<tr><td><span class="fn">${f.file}</span></td><td><strong style="color:${sco(f.score)}">${f.score}</strong><div class="sb"><div class="sb-f" style="width:${f.score}%;background:${sco(f.score)}"></div></div></td><td><span class="vt vt-${f.verdict}">${(f.verdict||'').replace('_',' ')}</span></td><td style="font-size:11px;color:var(--sub);max-width:280px">${f.summary||'—'}</td></tr>`;
                d+='</tbody></table>';
            }
            if(r.comments&&r.comments.length){
                d+=`<div style="font-size:13px;font-weight:700;margin-bottom:8px">💬 ${r.comments.length} Comments</div>`;
                for(const c of r.comments.slice(0,20)){
                    const sv=c.severity||'info';
                    d+=`<div class="cm sev-${sv}"><div class="cm-hd"><span class="cm-file">${c.path}:${c.line}</span><span class="cm-sev" style="color:var(--${sv==='critical'?'red':sv==='high'?'orange':sv==='medium'?'yellow':'blue'})">${sv}</span></div><div class="cm-msg">${c.message||''}</div>${c.suggestion?`<div class="cm-sug">${c.suggestion}</div>`:''}</div>`;
                }
            }
            return `<div class="rv" id="r-${i}"><div class="rv-hd" onclick="tr(${i})"><div class="rv-info"><div class="rv-score ${sc(s)}">${s}</div><div><div class="rv-title">PR #${r.pr_number} — ${r.repo||'?'}</div><div class="rv-meta"><span>📁 ${r.files_reviewed||0} files</span><span>🐛 ${r.total_issues||0} issues</span><span>🕐 ${r.timestamp?tf(r.timestamp):'—'}</span></div></div></div><div style="display:flex;align-items:center;gap:8px">${bg.join('')}<span class="exp">▼</span></div></div><div class="rv-dt">${d||'<p style="color:var(--muted)">No details.</p>'}</div></div>`;
        }

        async function lu() {
            const r=await fetch(`${A}/auth/me`),u=await r.json();
            if(u.logged_in) document.getElementById('usr').innerHTML=`<img src="${u.avatar_url}" alt=""><span class="usr-name">${u.name||u.login}</span><a href="/auth/logout">Sign out</a>`;
        }

        async function ld() {
            const sr=await fetch(`${A}/stats`),s=await sr.json();
            document.getElementById('v0').textContent=s.total_reviews||0;
            document.getElementById('v1').textContent=s.avg_score?Math.round(s.avg_score):'—';
            document.getElementById('v2').textContent=s.total_issues||0;
            document.getElementById('v3').textContent=(s.total_tokens||0).toLocaleString();
            const rr=await fetch(`${A}/reviews`),rv=await rr.json(),c=document.getElementById('rr');
            if(!rv.length)c.innerHTML='<div class="empty"><div class="ei">🛡️</div><h2>No Reviews Yet</h2><p>Enable a repo and open a PR to trigger your first AI review.</p></div>';
            else c.innerHTML=rv.slice(0,5).map((r,i)=>rrv(r,i)).join('');
        }

        async function lr() {
            const c=document.getElementById('rc');
            c.innerHTML='<div class="ld"><div class="sp"></div>Loading repos...</div>';
            try {
                const r=await fetch(`${A}/auth/repos`); ar=await r.json();
                if(!ar.length){c.innerHTML='<div class="empty"><div class="ei">📁</div><h2>No Repos Found</h2></div>';return}
                const en=ar.filter(r=>r.enabled),dis=ar.filter(r=>!r.enabled);
                let h='';
                if(en.length)h+=`<div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:10px">✓ Enabled (${en.length})</div><div class="rg">${en.map(rrc).join('')}</div><div style="margin-bottom:20px"></div>`;
                h+=`<div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px">Available (${dis.length})</div><div class="rg">${dis.map(rrc).join('')}</div>`;
                c.innerHTML=h;
            } catch(e){c.innerHTML='<div class="empty"><div class="ei">⚠️</div><h2>Error loading repos</h2></div>'}
        }

        async function lv() {
            const c=document.getElementById('rvl');
            const r=await fetch(`${A}/reviews`),rv=await r.json();
            if(!rv.length)c.innerHTML='<div class="empty"><div class="ei">📋</div><h2>No Reviews Yet</h2></div>';
            else c.innerHTML=rv.map((r,i)=>rrv(r,100+i)).join('');
        }

        lu(); ld(); setInterval(ld,20000);
    </script>
</body>
</html>
